<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Agentic coding workflow illustration</title>
  <desc id="desc">Visual showing autonomous coding agents planning, implementing, and validating software tasks.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="48%" stop-color="#d1fae5" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f2740" />
      <stop offset="100%" stop-color="#0a1f33" />
    </linearGradient>
    <linearGradient id="agentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.2" />
    </filter>
  </defs>

  <rect width="1600" height="1100" fill="url(#bgGradient)" />
  <circle cx="1320" cy="190" r="210" fill="#67e8f9" opacity="0.22" />
  <circle cx="290" cy="940" r="290" fill="#22d3ee" opacity="0.17" />
  <circle cx="1420" cy="860" r="220" fill="#34d399" opacity="0.15" />

  <g filter="url(#shadow)">
    <rect x="120" y="160" width="900" height="720" rx="32" fill="url(#panelGradient)" />
    <rect x="120" y="160" width="900" height="76" rx="32" fill="#17344f" />
    <circle cx="170" cy="198" r="10" fill="#fb7185" />
    <circle cx="208" cy="198" r="10" fill="#fbbf24" />
    <circle cx="246" cy="198" r="10" fill="#22d3ee" />

    <text x="300" y="206" fill="#bae6fd" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="26" font-weight="700">
      Agent Runner
    </text>

    <rect x="170" y="286" width="780" height="58" rx="12" fill="#0b3959" />
    <text x="198" y="323" fill="#7dd3fc" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="24">
      $ orchestrator.plan --goal "ship billing sync"
    </text>

    <rect x="170" y="368" width="720" height="46" rx="10" fill="#0d4463" />
    <text x="198" y="398" fill="#93c5fd" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      > Planner agent split work into 4 executable tasks
    </text>

    <rect x="170" y="434" width="690" height="46" rx="10" fill="#0d4d61" />
    <text x="198" y="464" fill="#99f6e4" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      > Coder agent implemented API + migration in 17m
    </text>

    <rect x="170" y="500" width="744" height="46" rx="10" fill="#124361" />
    <text x="198" y="530" fill="#bfdbfe" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      > Reviewer agent flagged edge case on retries
    </text>

    <rect x="170" y="566" width="760" height="46" rx="10" fill="#105054" />
    <text x="198" y="596" fill="#a7f3d0" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      > QA agent ran tests and posted release checklist
    </text>

    <rect x="170" y="648" width="780" height="170" rx="16" fill="#10283f" />
    <text x="198" y="696" fill="#e2e8f0" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="24">
      release.summary()
    </text>
    <text x="198" y="738" fill="#cbd5e1" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      - 4 tasks completed
    </text>
    <text x="198" y="774" fill="#cbd5e1" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      - 52 files changed with full test pass
    </text>
    <text x="198" y="810" fill="#cbd5e1" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" font-size="22">
      - Senior engineer approval requested
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="230" width="370" height="640" rx="30" fill="#ffffff" />
    <text x="1120" y="290" fill="#0f172a" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="700">
      Active agents
    </text>

    <rect x="1120" y="334" width="290" height="104" rx="18" fill="url(#agentGradient)" />
    <text x="1150" y="385" fill="#ecfeff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="25" font-weight="700">Planner</text>
    <circle cx="1378" cy="387" r="12" fill="#34d399" />

    <rect x="1120" y="470" width="290" height="104" rx="18" fill="url(#agentGradient)" opacity="0.9" />
    <text x="1150" y="521" fill="#ecfeff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="25" font-weight="700">Coder</text>
    <circle cx="1378" cy="523" r="12" fill="#34d399" />

    <rect x="1120" y="606" width="290" height="104" rx="18" fill="url(#agentGradient)" opacity="0.84" />
    <text x="1150" y="657" fill="#ecfeff" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="25" font-weight="700">Reviewer</text>
    <circle cx="1378" cy="659" r="12" fill="#34d399" />

    <line x1="1265" y1="438" x2="1265" y2="470" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" />
    <line x1="1265" y1="574" x2="1265" y2="606" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" />

    <rect x="1120" y="744" width="290" height="86" rx="14" fill="#f0f9ff" />
    <text x="1150" y="796" fill="#0f172a" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="600">
      Human sign-off
    </text>
  </g>
</svg>
