<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordClaw Adventure - Library</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1 class="logo">WordClaw Adventure</h1>
            <nav style="margin-top: 1rem;">
                <a href="/" class="primary-btn"
                    style="text-decoration:none; padding: 0.5rem 1rem; display: inline-block;">Back to Game</a>
            </nav>
        </header>
        <main>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Loading the Archives...</p>
            </div>

            <div id="library-container">
                <h2 id="themes-title">The Grand Archives</h2>
                <p id="themes-subtitle">Read the legendary tales of past adventurers.</p>
                <div id="story-list" class="theme-grid">
                    <!-- Stories will be injected here -->
                </div>
            </div>

            <!-- Modal for reading the full story -->
            <div id="story-modal" class="hidden"
                style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; overflow-y:auto; padding:2rem; display:flex; align-items:flex-start; justify-content:center;">
                <div
                    style="background:var(--bg-panel); border:1px solid var(--border); border-radius:16px; width:100%; max-width:800px; padding:2.5rem; position:relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
                    <button id="close-modal"
                        style="position:absolute; top:1.5rem; right:1.5rem; background:transparent; border:none; color:var(--text-main); font-size:2rem; cursor:pointer;">&times;</button>
                    <h2 id="modal-title"
                        style="font-family:'Playfair Display',serif; color:var(--accent); font-size: 2rem; margin-bottom:0.5rem; margin-right: 2rem;">
                        Title</h2>
                    <p id="modal-author" style="color:var(--text-muted); margin-bottom:1rem; font-size: 1.1rem;">By
                        Author</p>
                    <p id="modal-score"
                        style="color:var(--score); font-weight:bold; margin-bottom:2rem; font-size: 1.2rem;">Score: 0
                    </p>
                    <div id="modal-content"
                        style="white-space:pre-wrap; color:var(--text-main); line-height:1.8; font-size: 1.05rem;">
                        Content</div>
                </div>
            </div>
        </main>
    </div>
    <script src="library.js"></script>
</body>

</html>
