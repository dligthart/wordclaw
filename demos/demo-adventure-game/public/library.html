<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordClaw Adventure - The Grand Archives</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="library.css">
</head>

<body>
    <div id="app">
        <header>
            <h1 class="logo">WordClaw Adventure</h1>
            <nav>
                <a href="/" class="primary-btn"
                    style="text-decoration:none; padding: 0.5rem 1rem; display: inline-block;">Back to Game</a>
            </nav>
        </header>

        <main>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Loading the Archives...</p>
            </div>

            <section id="library-container">
                <div class="archives-header">
                    <h2 class="archives-title">The Grand Archives</h2>
                    <p class="archives-subtitle">Legendary tales of past adventurers, preserved for eternity.</p>
                </div>
                <div id="story-list" class="story-grid"></div>
            </section>

            <!-- Story Reader Modal -->
            <div id="story-modal" class="modal-overlay hidden">
                <div class="modal-panel">
                    <div class="modal-top-actions">
                        <button id="download-pdf-btn" class="pdf-btn" title="Download PDF">📄 PDF</button>
                        <button id="close-modal" class="modal-close">&times;</button>
                    </div>

                    <div class="modal-hero" id="modal-hero"></div>

                    <div class="modal-body">
                        <h2 id="modal-title" class="modal-story-title">Title</h2>
                        <div class="modal-meta">
                            <span id="modal-author" class="meta-author">By Author</span>
                            <span id="modal-score" class="meta-score">Score: 0</span>
                        </div>

                        <div id="modal-achievements" class="badges-row"></div>
                        <div id="modal-inventory" class="badges-row"></div>

                        <div id="modal-content" class="story-chapters">
                            Content
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="jspdf.umd.min.js"></script>
    <script src="library.js"></script>
</body>

</html>
